<!DOCTYPE html>
<html lang="{{ site.Language.Locale }}" dir="{{ or site.Language.Direction `ltr` }}">
<head>
    {{ partial "head.html" . }}
</head>
<body>
    <header>
        {{ partial "header.html" . }}
    </header>

    <main>
        {{ block "main" . }}
        This will be replaced with content from the 
        corresponding "define" action found in the template
        to which this base template is applied.
        {{ end }}
    </main>

    <footer>
        {{ partial "footer.html" . }}
    </footer>
</body>
