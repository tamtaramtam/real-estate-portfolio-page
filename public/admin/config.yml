backend: 
  name: git-gateway
  branch: main  # The branch where your content is stored. For GitHub, this is usually "main" or "master".

local_backend: true  # Use the local backend for development (optional, but can speed up development)

# The media localization
media_folder: "static/images/uploads" # The folder where uploaded media files will be stored
public_folder: "/images/uploads" # The public URL for the media files

# Collections define the structure of your content
collections:
  - name: 'oferty'  # The name of the collection, used in the URL and as a reference in your templates
    label: "Oferty nieruchomości"   # name visible in CMS panel 
    folder: "content/oferty"  # The folder where the markdown files for this collection will be stored
    create: true  # Allow users to create new entries in this collection
    slug: "{{slug}}"  # The URL slug for each entry, based on the filename (e.g. 'nazwa-oferty.md')
    fields:
      - { label: "Tytuł", name: "title", widget: "string", hint: "Przestronny dom z ogrodem..." }
      - { label: "Status", name: "status", widget: "select", options: ["Dostępna", "Zarezerwowana", "Sprzedana"], default: "Dostępna" }
      - { label: "Typ nieruchomości", name: "type", widget: "select", options: ["Działka", "Mieszkanie", "Dom"] } # dodać kolejne pola !!!!!!!
      - { label: "Cena", name: "price", widget: "number" }
      - { label: "Cena (tekst)", name: "price_text", widget: "string", required: false, hint: "np. '1 000 000 PLN' lub 'do negocjacji' lub 'zapytaj o cenę'" }

      - { label: "Lokalizacja", name: "location", widget: "string", hint: "Warszawa, ul. Marszałkowska 10" }
      - { label: "Lokalizacja Google Maps", name: "map_location", widget: "map", required: false, hint: "Kliknij na mapie, aby wskazać lokalizację" }

      - { label: "Forma własności", name: "ownership", widget: "string", required: false, hint: "Opcjonalne - np. 'Własność', 'Spółdzielcze własnościowe', 'Najem'" }

      # for plots only
      - label: "Powierzchnia"
        name: "area"
        widget: "object"
        fields:
          - { label: "Wartość", name: "value", widget: "number" }
          - { label: "Jednostka", name: "unit", widget: "select", options: ["m²", "ha"] }

      - { label: "Kształt działki", name: "plot_shape", widget: "select", required: false, options: ["Prostokąt", "Trójkąt", "Okrąg", "Wielokąt", "Nieregularny"], hint: "Opcjonalne - tylko dla działek" }
      - { label: "Droga dojazdowa", name: "access_road", widget: "select", required: false, options: ["Asfaltowa", "Dojazdowa (utwardzona)", "Dojazdowa (nieutwardzona)", "Brak"], hint: "Opcjonalne - tylko dla działek" }
      - { label: "Rodzaj działki", name: "plot_type", widget: "select", required: false, options: ["Budowlana", "Rolna", "Leśna", "Inna"], hint: "Opcjonalne - tylko dla działek" }
      
      - label: "Uzbrojenie terenu"
        name: "utilities"
        widget: "object"
        fields:
          - { label: "Woda", name: "water", widget: "boolean" }
          - { label: "Prąd", name: "electricity", widget: "boolean" }
          - { label: "Gaz", name: "gas", widget: "boolean" }
          - { label: "Kanalizacja", name: "sewer", widget: "boolean" }

      # for apartments and houses only
      - { label: "Liczba pokoi", name: "rooms", widget: "number", required: false, hint: "Opcjonalne - tylko dla mieszkań i domów" }
      - { label: "Powierzchnia użytkowa", name: "usable_area", widget: "number", required: false, hint: "Opcjonalne - tylko dla mieszkań i domów" }
      - { label: "Rok budowy", name: "year_built", widget: "number", required: false, hint: "Opcjonalne - tylko dla mieszkań i domów" }
      - { label: "Piętro", name: "floor", widget: "number", required: false, hint: "Opcjonalne - tylko dla mieszkań" }
      - { label: "Liczba pięter", name: "floors", widget: "number", required: false, hint: "Opcjonalne - tylko dla domów" }

      #photos and videos
      - { label: "Zdjęcie główne", name: "main_image", widget: "image", required: false, hint: "Dodaj główne zdjęcie nieruchomości" }

      - label: "Galeria zdjęć"
        name: "gallery"
        widget: "list"
        required: false
        fields:
          - { label: "Zdjęcie", name: "image", widget: "image", hint: "Dodaj zdjęcie do galerii" }
          - { label: "Opis zdjęcia", name: "caption", widget: "string", required: false, hint: "Opcjonalny opis zdjęcia" }

      - label: "Filmy"
        name: "videos"
        widget: "list"
        required: false
        fields:
          - { label: "Tytuł filmu", name: "title", widget: "string", hint: "Opcjonalny tytuł filmu" }
          - { label: "URL filmu", name: "url", widget: "string", hint: "Wklej URL filmu z YouTube lub Vimeo" }

      - { label: "Opis", name: "description", widget: "richtext", hint: "Przestronny dom z ogrodem..." }

      #extra features
      - label: "Dodatkowe cechy"
        name: "extra_features"
        widget: "list"
        required: false
        fields:
          - { label: "Cecha", name: "feature", widget: "string", required: false, hint: "Opcjonalne dodatkowe cechy (np. 'Balkon', 'Ogród', 'Garaż')" }

      - { label: "Data dodania", name: "date_added", widget: "datetime", default: "{{now}}" }

      - { label: "Autor oferty", name: "author", widget: "string", required: false, hint: "Opcjonalne - imię agenta lub biura nieruchomości" }

      - { label: "Kontakt", name: "contact", widget: "string", required: false, hint: "Opcjonalne - np. numer telefonu lub adres e-mail" }

      - { label: "Wyróżniona oferta", name: "featured", widget: "boolean", default: false, hint: "Zaznacz, jeśli chcesz wyróżnić tę ofertę na stronie głównej" }